<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing – Boostly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .pricing-hero {
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .coming-soon-badge {
            background: rgba(34, 211, 238, 0.1);
            color: #22d3ee;
            padding: 0.5rem 1.25rem;
            border-radius: 100px;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: 1px solid rgba(34, 211, 238, 0.2);
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
        }

        .pricing-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            font-weight: 500;
            font-size: clamp(3.5rem, 10vw, 7rem);
            line-height: 1.1;
            color: #fff;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .pricing-subtext {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .pricing-cta {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
    </style>
</head>

<body>

    <!-- ═══ BACKGROUND ═══ -->
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow-top" aria-hidden="true"></div>
    <div class="bg-glow-bottom" aria-hidden="true"></div>

    <!-- ═══ NAVBAR ═══ -->
    <header class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                        <path d="M7 2L3 12H9L6 20L16 9H10L14 2H7Z" fill="url(#bolt1)" />
                        <path d="M13 2L9 12H15L12 20L22 9H16L20 2H13Z" fill="url(#bolt2)" opacity="0.55" />
                        <defs>
                            <linearGradient id="bolt1" x1="3" y1="2" x2="9" y2="20">
                                <stop stop-color="#22d3ee" />
                                <stop offset="1" stop-color="#0891b2" />
                            </linearGradient>
                            <linearGradient id="bolt2" x1="9" y1="2" x2="15" y2="20">
                                <stop stop-color="#67e8f9" />
                                <stop offset="1" stop-color="#22d3ee" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">BOOSTLY</span>
            </a>

            <nav class="nav-links">
                <a href="index.html">Homepage</a>
                <a href="pricing.html" class="active">Pricing</a>
                <a href="portfolio.html">Case Studies</a>
                <a href="https://discord.gg/minecom" target="_blank">Contact Us</a>
            </nav>

            <div class="nav-ctas">
                <a href="#" class="btn-ghost">Sign up</a>
                <a href="#" class="btn-purple">Try for Free</a>
            </div>
        </div>
    </header>

    <main class="pricing-hero">
        <div class="coming-soon-badge">Coming Soon</div>
        <h1 class="pricing-title">Transparent Pricing <br> Simplified.</h1>
        <p class="pricing-subtext">
            We're putting the final touches on our pricing plans to ensure you get the best value for your growth
            journey.
        </p>
        <div class="pricing-cta">
            <a href="https://discord.gg/minecom" target="_blank" class="btn-teal">Join our Discord</a>
            <a href="index.html" class="btn-dark-outline">Back to Home</a>
        </div>
    </main>

</body>

</html>
